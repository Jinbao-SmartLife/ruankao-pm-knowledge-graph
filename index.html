<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软考知识图谱 - 信息系统项目管理师</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/matrix.css">
    <link rel="stylesheet" href="css/panel.css">
    <style>
    .test-toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary);cursor:pointer;user-select:none}
    .test-toggle input{display:none}
    .toggle-track{width:36px;height:20px;border-radius:10px;background:var(--bg-hover);position:relative;transition:var(--transition)}
    .toggle-track::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--text-secondary);transition:var(--transition)}
    .test-toggle input:checked+.toggle-track{background:var(--accent-orange)}
    .test-toggle input:checked+.toggle-track::after{left:18px;background:#fff}
    body.test-mode .answer{color:transparent!important;background:var(--bg-hover)!important;border-radius:4px;cursor:pointer}
    body.test-mode .answer:hover{background:var(--bg-tertiary)!important}
    body.test-mode .answer.revealed{color:inherit!important;background:transparent!important}
    </style>
</head>
<body>
    <!-- Header -->
    <header id="header">
        <div class="header-left">
            <h1 class="logo">软考知识图谱</h1>
        </div>
        <div class="header-center">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="搜索知识点..." autocomplete="off">
                <div id="search-results" class="search-dropdown hidden"></div>
            </div>
        </div>
        <div class="header-right">
            <a href="index.html" class="nav-tab active" style="text-decoration:none">矩阵</a>
            <a href="performance.html" class="nav-tab" style="text-decoration:none">绩效域</a>
            <a href="itto.html" class="nav-tab" style="text-decoration:none">ITTO</a>
            <a href="memory.html" class="nav-tab" style="text-decoration:none">关联记忆</a>
            <label class="test-toggle" style="margin-left:8px">
                <span>测试</span>
                <input type="checkbox" id="testModeToggle">
                <span class="toggle-track"></span>
            </label>
        </div>
    </header>

    <!-- Main Content -->
    <main id="app">
        <!-- Matrix View -->
        <div id="view-matrix" class="view-container">
            <div class="matrix-wrapper">
                <!-- PMBOK Matrix rendered by JS -->
                <div id="pmbook-matrix" class="matrix"></div>
                <!-- Performance Domain Cards -->
                <div class="section-divider"></div>
                <h2 class="section-title">八大绩效域</h2>
                <div id="perf-domains-grid" class="perf-domains-grid"></div>
            </div>
        </div>

        <!-- Performance Domain Detail View -->
        <div id="view-performance" class="view-container hidden">
            <div class="perf-detail-wrapper">
                <div id="perf-detail-cards" class="perf-detail-cards"></div>
            </div>
        </div>

        <!-- Detail Panel (shared across views) -->
        <aside id="detail-panel" class="detail-panel hidden">
            <div class="panel-header">
                <h2 id="panel-title" class="panel-title"></h2>
                <button id="panel-close" class="panel-close-btn">&times;</button>
            </div>
            <div class="panel-breadcrumb" id="panel-breadcrumb"></div>
            <div class="panel-tabs" id="panel-tabs">
                <button class="tab active" data-tab="overview">概述</button>
                <button class="tab" data-tab="itto">输入输出</button>
                <button class="tab" data-tab="exam">考频</button>
                <button class="tab" data-tab="mnemonic">口诀</button>
            </div>
            <div class="panel-content" id="panel-content"></div>
        </aside>
    </main>

    <!-- Scripts: D3 first, then data, then app logic -->
    <script src="lib/d3.v7.min.js"></script>
    <script src="data/nodes.js"></script>
    <script src="data/edges.js"></script>
    <script src="data/exam-frequency.js"></script>
    <script src="data/mnemonics.js"></script>
    <script src="data/essay-topics.js"></script>
    <script src="data/glossary.js"></script>
    <script src="js/data.js"></script>
    <script src="js/matrix.js"></script>
    <script src="js/panel.js"></script>
    <script src="js/search.js"></script>
    <script src="js/app.js"></script>
    <script>
    document.getElementById('testModeToggle').addEventListener('change', function() {
        document.body.classList.toggle('test-mode', this.checked);
    });
    document.addEventListener('click', function(e) {
        if (document.body.classList.contains('test-mode') && e.target.classList.contains('answer')) {
            e.target.classList.toggle('revealed');
        }
    });
    </script>
</body>
</html>
